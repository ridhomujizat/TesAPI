name: Release TesAPI

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (for example v0.1.0)'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

jobs:
  macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: macos-13
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: npm ci
      - run: npm run check:version
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: npm run tauri
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || 'v__VERSION__' }}
          releaseName: TesAPI v__VERSION__
          releaseBody: Download the DMG for your Mac. TesAPI will use the signed updater artifacts for future releases.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} --config src-tauri/tauri.release.conf.json
